<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Turnera</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content pullingText="Soltar para actualizar" refreshingSpinner="crescent" refreshingText="Actualizando..."></ion-refresher-content>
  </ion-refresher>

  <div class="greeting" *ngIf="userName">
    <h2>Hola, {{ userName }}!</h2>
    <p>Selecciona una barberia para reservar tu turno.</p>
  </div>

  <div *ngIf="loading" class="ion-text-center ion-padding">
    <ion-spinner name="crescent" color="primary"></ion-spinner>
  </div>

  <ion-list *ngIf="!loading">
    <ion-item *ngFor="let bs of barbershops" button detail (click)="goToBarbershop(bs)">
      <ion-avatar slot="start">
        <img *ngIf="bs.logoImage" [src]="bs.logoImage" />
        <div *ngIf="!bs.logoImage" class="avatar-placeholder">
          <ion-icon name="storefront-outline"></ion-icon>
        </div>
      </ion-avatar>
      <ion-label>
        <h2>{{ bs.name }}</h2>
        <p>{{ bs.address }}</p>
        <p *ngIf="bs.phone">{{ bs.phone }}</p>
      </ion-label>
      <ion-chip slot="end" color="primary" outline *ngIf="bs.avgRating">
        <ion-icon name="star" color="warning"></ion-icon>
        <ion-label>{{ bs.avgRating }}</ion-label>
      </ion-chip>
    </ion-item>
  </ion-list>

  <div *ngIf="!loading && barbershops.length === 0" class="ion-text-center ion-padding">
    <ion-icon name="storefront-outline" size="large" color="medium"></ion-icon>
    <p>No hay barberias disponibles.</p>
  </div>

</ion-content>
