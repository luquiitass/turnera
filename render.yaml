databases:
  - name: barber-db
    plan: free
    databaseName: barber_db

services:
  # Backend API
  - type: web
    name: turnera-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: barber-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 24h
      - key: JWT_REFRESH_EXPIRATION
        value: 30d
      - key: GOOGLE_CLIENT_ID
        value: 133837939687-0shh87htvb22621cajt7adh04ojsvg6t.apps.googleusercontent.com
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

  # Client App (static site)
  - type: web
    name: turnera-client
    runtime: static
    plan: free
    rootDir: client-app
    buildCommand: npm install && npx ng build --configuration production
    staticPublishPath: www
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
